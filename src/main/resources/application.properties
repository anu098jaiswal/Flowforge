spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowforge}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.sql.init.mode=always
spring.quartz.job-store-type=memory

# --- CORS ---
# Comma-separated list of frontend origins allowed to call this API.
# Add your deployed frontend URL here (or set the env var) before going live -
# e.g. CORS_ALLOWED_ORIGINS=https://app.yourdomain.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# --- Inbox polling for TriggerType.EMAIL workflows ---
# Off by default so the app still boots cleanly with no mail creds set.
# Set EMAIL_POLL_ENABLED=true to turn it on.
flowforge.email-poll.enabled=${EMAIL_POLL_ENABLED:false}
flowforge.email-poll.interval-ms=${EMAIL_POLL_INTERVAL_MS:30000}
flowforge.email-poll.imap-host=${MAIL_IMAP_HOST:imap.gmail.com}
flowforge.email-poll.imap-port=${MAIL_IMAP_PORT:993}

# --- Stripe Configuration ---
stripe.api.key=${STRIPE_API_KEY:sk_test_your_stripe_api_key_here}

# --- JWT Configuration ---
jwt.secret=${JWT_SECRET:flowforge-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}
